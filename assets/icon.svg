<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="sf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b9eff"/>
      <stop offset="100%" stop-color="#1a6de0"/>
    </linearGradient>
    <linearGradient id="sb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3660"/>
      <stop offset="100%" stop-color="#0f2340"/>
    </linearGradient>
    <linearGradient id="wl" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#40c8ff"/>
      <stop offset="100%" stop-color="#80e0ff"/>
    </linearGradient>
    <linearGradient id="wr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#40c8ff"/>
      <stop offset="100%" stop-color="#80e0ff"/>
    </linearGradient>
    <linearGradient id="eye" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20d0c0"/>
      <stop offset="100%" stop-color="#0ea898"/>
    </linearGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40c8ff"/>
      <stop offset="100%" stop-color="#1a6de0"/>
    </linearGradient>
  </defs>

  <!-- Wings -->
  <g>
    <path d="M6,42 L52,42 L52,48 L10,48 Z" fill="url(#wl)" stroke="#1a3660" stroke-width="0.8"/>
    <path d="M12,51 L52,51 L52,57 L16,57 Z" fill="url(#wl)" stroke="#1a3660" stroke-width="0.8"/>
    <path d="M18,60 L52,60 L52,66 L21,66 Z" fill="url(#wl)" stroke="#1a3660" stroke-width="0.8"/>
  </g>
  <g>
    <path d="M122,42 L76,42 L76,48 L118,48 Z" fill="url(#wr)" stroke="#1a3660" stroke-width="0.8"/>
    <path d="M116,51 L76,51 L76,57 L112,57 Z" fill="url(#wr)" stroke="#1a3660" stroke-width="0.8"/>
    <path d="M110,60 L76,60 L76,66 L107,66 Z" fill="url(#wr)" stroke="#1a3660" stroke-width="0.8"/>
  </g>

  <!-- Brackets -->
  <g stroke="#40c8ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="8,48 2,54 8,60"/>
    <polyline points="120,48 126,54 120,60"/>
  </g>

  <!-- Shield -->
  <path d="M40,16 L88,16 Q92,16 92,20 L92,72 Q92,92 64,105 Q36,92 36,72 L36,20 Q36,16 40,16 Z" fill="url(#sb)"/>
  <path d="M43,19 L85,19 Q88,19 88,22 L88,70 Q88,88 64,100 Q40,88 40,70 L40,22 Q40,19 43,19 Z" fill="url(#sf)"/>

  <!-- Bug antennae -->
  <path d="M58,38 Q54,28 50,24" fill="none" stroke="#1a3660" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="49" cy="23" r="2.5" fill="url(#cg)"/>
  <path d="M70,38 Q74,28 78,24" fill="none" stroke="#1a3660" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="79" cy="23" r="2.5" fill="url(#cg)"/>

  <!-- Bug head -->
  <ellipse cx="64" cy="42" rx="12" ry="9" fill="#1a3660" stroke="#0f2340" stroke-width="1"/>

  <!-- Bug eyes -->
  <circle cx="59" cy="41" r="4.5" fill="url(#eye)" stroke="#0f2340" stroke-width="1"/>
  <circle cx="69" cy="41" r="4.5" fill="url(#eye)" stroke="#0f2340" stroke-width="1"/>
  <circle cx="57.5" cy="39.5" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="67.5" cy="39.5" r="1.5" fill="#ffffff" opacity="0.5"/>

  <!-- Bug body -->
  <ellipse cx="64" cy="68" rx="20" ry="25" fill="url(#sf)" stroke="#1a3660" stroke-width="1.2"/>

  <!-- Wing split -->
  <line x1="64" y1="44" x2="64" y2="92" stroke="#1a3660" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Wing veins -->
  <path d="M52,58 Q58,62 62,60" fill="none" stroke="#1a6de0" stroke-width="0.7" opacity="0.4"/>
  <path d="M76,58 Q70,62 66,60" fill="none" stroke="#1a6de0" stroke-width="0.7" opacity="0.4"/>

  <!-- Circuit dots -->
  <circle cx="55" cy="65" r="1.5" fill="#40c8ff" opacity="0.5"/>
  <circle cx="73" cy="65" r="1.5" fill="#40c8ff" opacity="0.5"/>

  <!-- Bug legs -->
  <g stroke="#1a3660" stroke-width="1.2" stroke-linecap="round" fill="none">
    <path d="M45,56 L38,50 L35,52"/>
    <path d="M44,67 L36,67 L34,70"/>
    <path d="M46,78 L39,82 L37,80"/>
    <path d="M83,56 L90,50 L93,52"/>
    <path d="M84,67 L92,67 L94,70"/>
    <path d="M82,78 L89,82 L91,80"/>
  </g>
</svg>
