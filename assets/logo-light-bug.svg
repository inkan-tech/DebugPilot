<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b9eff"/>
      <stop offset="100%" stop-color="#1a6de0"/>
    </linearGradient>
    <linearGradient id="shieldBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3660"/>
      <stop offset="100%" stop-color="#0f2340"/>
    </linearGradient>
    <linearGradient id="wingGradL" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#40c8ff"/>
      <stop offset="100%" stop-color="#80e0ff"/>
    </linearGradient>
    <linearGradient id="wingGradR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#40c8ff"/>
      <stop offset="100%" stop-color="#80e0ff"/>
    </linearGradient>
    <linearGradient id="visorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20d0c0"/>
      <stop offset="50%" stop-color="#18b8a8"/>
      <stop offset="100%" stop-color="#0ea898"/>
    </linearGradient>
    <linearGradient id="helmetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#c8d4e0"/>
    </linearGradient>
    <linearGradient id="helmetSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dce4ec"/>
      <stop offset="100%" stop-color="#b0bcc8"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40c8ff"/>
      <stop offset="100%" stop-color="#1a6de0"/>
    </linearGradient>
  </defs>

  <!-- ═══ WINGS (behind shield) ═══ -->
  <!-- Left wing — 3 bars, longest on top -->
  <g>
    <!-- Bar 1 (top, longest) — with pointed tip -->
    <path d="M70,195 L260,195 L260,220 L90,220 Z" fill="url(#wingGradL)" stroke="#1a3660" stroke-width="2"/>
    <!-- Bar 2 (middle) -->
    <path d="M100,228 L260,228 L260,253 L118,253 Z" fill="url(#wingGradL)" stroke="#1a3660" stroke-width="2"/>
    <!-- Bar 3 (bottom, shortest) -->
    <path d="M130,261 L260,261 L260,286 L145,286 Z" fill="url(#wingGradL)" stroke="#1a3660" stroke-width="2"/>
  </g>

  <!-- Right wing — mirrored -->
  <g>
    <!-- Bar 1 (top, longest) -->
    <path d="M530,195 L340,195 L340,220 L510,220 Z" fill="url(#wingGradR)" stroke="#1a3660" stroke-width="2"/>
    <!-- Bar 2 (middle) -->
    <path d="M500,228 L340,228 L340,253 L482,253 Z" fill="url(#wingGradR)" stroke="#1a3660" stroke-width="2"/>
    <!-- Bar 3 (bottom, shortest) -->
    <path d="M470,261 L340,261 L340,286 L455,286 Z" fill="url(#wingGradR)" stroke="#1a3660" stroke-width="2"/>
  </g>

  <!-- Code brackets < > -->
  <g stroke="#40c8ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="55,220 35,240 55,260"/>
    <polyline points="545,220 565,240 545,260"/>
  </g>

  <!-- ═══ SHIELD ═══ -->
  <!-- Shield border (dark navy) -->
  <path d="M210,100 L390,100 Q400,100 400,110 L400,280 Q400,340 300,380 Q200,340 200,280 L200,110 Q200,100 210,100 Z"
        fill="url(#shieldBorder)"/>
  <!-- Shield inner fill (blue) -->
  <path d="M220,112 L380,112 Q388,112 388,120 L388,275 Q388,330 300,365 Q212,330 212,275 L212,120 Q212,112 220,112 Z"
        fill="url(#shieldFill)"/>
  <!-- Shield white inner border -->
  <path d="M225,118 L375,118 Q382,118 382,125 L382,272 Q382,324 300,356 Q218,324 218,272 L218,125 Q218,118 225,118 Z"
        fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.5"/>

  <!-- ═══ BUG — stylized debug beetle ═══ -->

  <!-- Bug antennae — curved, expressive -->
  <path d="M280,165 Q270,135 258,125" fill="none" stroke="#1a3660" stroke-width="3" stroke-linecap="round"/>
  <circle cx="255" cy="122" r="5" fill="url(#circuitGrad)"/>
  <path d="M320,165 Q330,135 342,125" fill="none" stroke="#1a3660" stroke-width="3" stroke-linecap="round"/>
  <circle cx="345" cy="122" r="5" fill="url(#circuitGrad)"/>

  <!-- Bug head -->
  <ellipse cx="300" cy="172" rx="28" ry="22" fill="#1a3660" stroke="#0f2340" stroke-width="2"/>

  <!-- Bug eyes — large, expressive, teal -->
  <circle cx="285" cy="170" r="11" fill="url(#visorGrad)" stroke="#0f2340" stroke-width="2"/>
  <circle cx="315" cy="170" r="11" fill="url(#visorGrad)" stroke="#0f2340" stroke-width="2"/>
  <!-- Eye glare -->
  <circle cx="281" cy="166" r="4" fill="#ffffff" opacity="0.5"/>
  <circle cx="311" cy="166" r="4" fill="#ffffff" opacity="0.5"/>

  <!-- Bug body — rounded shield shape -->
  <ellipse cx="300" cy="240" rx="55" ry="65" fill="url(#shieldFill)" stroke="#1a3660" stroke-width="2.5"/>

  <!-- Wing split line down the center -->
  <line x1="300" y1="178" x2="300" y2="302" stroke="#1a3660" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wing detail lines -->
  <path d="M265,210 Q280,220 295,215" fill="none" stroke="#1a6de0" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M335,210 Q320,220 305,215" fill="none" stroke="#1a6de0" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M260,240 Q280,252 295,245" fill="none" stroke="#1a6de0" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M340,240 Q320,252 305,245" fill="none" stroke="#1a6de0" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Circuit dots on wings -->
  <circle cx="275" cy="220" r="3" fill="#40c8ff" opacity="0.5"/>
  <circle cx="325" cy="220" r="3" fill="#40c8ff" opacity="0.5"/>
  <circle cx="270" cy="250" r="2.5" fill="#40c8ff" opacity="0.4"/>
  <circle cx="330" cy="250" r="2.5" fill="#40c8ff" opacity="0.4"/>
  <circle cx="280" cy="270" r="2" fill="#40c8ff" opacity="0.3"/>
  <circle cx="320" cy="270" r="2" fill="#40c8ff" opacity="0.3"/>

  <!-- Bug legs — 3 pairs, angled out -->
  <g stroke="#1a3660" stroke-width="2.5" stroke-linecap="round" fill="none">
    <!-- Left legs -->
    <path d="M248,205 L228,190 L218,195"/>
    <path d="M245,238 L222,238 L215,245"/>
    <path d="M250,268 L232,280 L225,275"/>
    <!-- Right legs -->
    <path d="M352,205 L372,190 L382,195"/>
    <path d="M355,238 L378,238 L385,245"/>
    <path d="M350,268 L368,280 L375,275"/>
  </g>
  <!-- Leg joint dots -->
  <g fill="#1a3660">
    <circle cx="228" cy="190" r="2.5"/>
    <circle cx="222" cy="238" r="2.5"/>
    <circle cx="232" cy="280" r="2.5"/>
    <circle cx="372" cy="190" r="2.5"/>
    <circle cx="378" cy="238" r="2.5"/>
    <circle cx="368" cy="280" r="2.5"/>
  </g>

  <!-- ═══ STARS ═══ -->
  <g fill="#40d8c0">
    <!-- Left star -->
    <polygon points="230,340 233,348 242,348 235,353 237,362 230,357 223,362 225,353 218,348 227,348" />
    <!-- Right star -->
    <polygon points="370,340 373,348 382,348 375,353 377,362 370,357 363,362 365,353 358,348 367,348" />
  </g>

  <!-- ═══ TEXT ═══ -->
  <text x="300" y="440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="800" text-anchor="middle" letter-spacing="0.5">
    <tspan fill="#1a3660">Debug</tspan><tspan fill="#1a6de0">Pilot</tspan>
  </text>
</svg>
