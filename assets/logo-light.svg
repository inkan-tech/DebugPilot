<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b9eff"/>
      <stop offset="100%" stop-color="#1a6de0"/>
    </linearGradient>
    <linearGradient id="shieldBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3660"/>
      <stop offset="100%" stop-color="#0f2340"/>
    </linearGradient>
    <linearGradient id="wingGradL" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#40c8ff"/>
      <stop offset="100%" stop-color="#80e0ff"/>
    </linearGradient>
    <linearGradient id="wingGradR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#40c8ff"/>
      <stop offset="100%" stop-color="#80e0ff"/>
    </linearGradient>
    <linearGradient id="visorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20d0c0"/>
      <stop offset="50%" stop-color="#18b8a8"/>
      <stop offset="100%" stop-color="#0ea898"/>
    </linearGradient>
    <linearGradient id="helmetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#c8d4e0"/>
    </linearGradient>
    <linearGradient id="helmetSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dce4ec"/>
      <stop offset="100%" stop-color="#b0bcc8"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40c8ff"/>
      <stop offset="100%" stop-color="#1a6de0"/>
    </linearGradient>
  </defs>

  <!-- ═══ WINGS (behind shield) ═══ -->
  <!-- Left wing — 3 bars, longest on top -->
  <g>
    <!-- Bar 1 (top, longest) — with pointed tip -->
    <path d="M70,195 L260,195 L260,220 L90,220 Z" fill="url(#wingGradL)" stroke="#1a3660" stroke-width="2"/>
    <!-- Bar 2 (middle) -->
    <path d="M100,228 L260,228 L260,253 L118,253 Z" fill="url(#wingGradL)" stroke="#1a3660" stroke-width="2"/>
    <!-- Bar 3 (bottom, shortest) -->
    <path d="M130,261 L260,261 L260,286 L145,286 Z" fill="url(#wingGradL)" stroke="#1a3660" stroke-width="2"/>
  </g>

  <!-- Right wing — mirrored -->
  <g>
    <!-- Bar 1 (top, longest) -->
    <path d="M530,195 L340,195 L340,220 L510,220 Z" fill="url(#wingGradR)" stroke="#1a3660" stroke-width="2"/>
    <!-- Bar 2 (middle) -->
    <path d="M500,228 L340,228 L340,253 L482,253 Z" fill="url(#wingGradR)" stroke="#1a3660" stroke-width="2"/>
    <!-- Bar 3 (bottom, shortest) -->
    <path d="M470,261 L340,261 L340,286 L455,286 Z" fill="url(#wingGradR)" stroke="#1a3660" stroke-width="2"/>
  </g>

  <!-- Code brackets < > -->
  <g stroke="#40c8ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="55,220 35,240 55,260"/>
    <polyline points="545,220 565,240 545,260"/>
  </g>

  <!-- ═══ SHIELD ═══ -->
  <!-- Shield border (dark navy) -->
  <path d="M210,100 L390,100 Q400,100 400,110 L400,280 Q400,340 300,380 Q200,340 200,280 L200,110 Q200,100 210,100 Z"
        fill="url(#shieldBorder)"/>
  <!-- Shield inner fill (blue) -->
  <path d="M220,112 L380,112 Q388,112 388,120 L388,275 Q388,330 300,365 Q212,330 212,275 L212,120 Q212,112 220,112 Z"
        fill="url(#shieldFill)"/>
  <!-- Shield white inner border -->
  <path d="M225,118 L375,118 Q382,118 382,125 L382,272 Q382,324 300,356 Q218,324 218,272 L218,125 Q218,118 225,118 Z"
        fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.5"/>

  <!-- ═══ MODERN PILOT HELMET ═══ -->
  <!-- Helmet dome — sleek, smooth shape -->
  <path d="M245,268 C245,188 262,152 300,140 C338,152 355,188 355,268 Q355,278 345,280 L255,280 Q245,278 245,268 Z"
        fill="url(#helmetGrad)" stroke="#b0bcc8" stroke-width="2"/>
  <!-- Helmet side panels -->
  <path d="M245,230 C245,195 258,165 278,155 L278,180 L245,230 Z" fill="url(#helmetSide)" opacity="0.5"/>
  <path d="M355,230 C355,195 342,165 322,155 L322,180 L355,230 Z" fill="url(#helmetSide)" opacity="0.5"/>
  <!-- Helmet ridge line -->
  <path d="M278,152 Q300,142 322,152" fill="none" stroke="#b0bcc8" stroke-width="2" stroke-linecap="round"/>
  <line x1="300" y1="140" x2="300" y2="165" stroke="#c0ccd8" stroke-width="2" stroke-linecap="round"/>

  <!-- ═══ ANTENNAS — thin, modern sensor style ═══ -->
  <line x1="284" y1="165" x2="278" y2="130" stroke="#1a3660" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="278" cy="127" r="3.5" fill="url(#circuitGrad)"/>
  <line x1="316" y1="165" x2="322" y2="137" stroke="#1a3660" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="322" cy="134" r="3.5" fill="url(#circuitGrad)"/>

  <!-- Circuit trace between antennas -->
  <path d="M282,158 L295,162 L300,158 L305,162 L318,158" fill="none" stroke="#1a3660" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="300" cy="158" r="2.5" fill="#1a3660"/>
  <!-- Extra circuit nodes on dome -->
  <circle cx="288" cy="175" r="1.8" fill="#40c8ff" opacity="0.5"/>
  <circle cx="312" cy="175" r="1.8" fill="#40c8ff" opacity="0.5"/>
  <line x1="288" y1="175" x2="300" y2="170" stroke="#40c8ff" stroke-width="0.8" opacity="0.35"/>
  <line x1="312" y1="175" x2="300" y2="170" stroke="#40c8ff" stroke-width="0.8" opacity="0.35"/>
  <circle cx="300" cy="170" r="1.5" fill="#40c8ff" opacity="0.4"/>

  <!-- ═══ WIDE VISOR — modern wraparound ═══ -->
  <!-- Visor frame -->
  <path d="M244,218 Q244,196 262,193 L338,193 Q356,196 356,218 Q356,244 338,248 L262,248 Q244,244 244,218 Z"
        fill="#1a3660" stroke="#0f2340" stroke-width="2.5"/>

  <!-- Visor glass — single wide band -->
  <path d="M252,218 Q252,202 266,200 L334,200 Q348,202 348,218 Q348,238 334,240 L266,240 Q252,238 252,218 Z"
        fill="url(#visorGrad)" stroke="#0f2340" stroke-width="1.5"/>

  <!-- Visor reflections -->
  <path d="M262,205 Q280,202 310,205" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <path d="M270,210 Q290,208 320,211" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Visor side vents -->
  <line x1="248" y1="210" x2="240" y2="208" stroke="#0f2340" stroke-width="2" stroke-linecap="round"/>
  <line x1="248" y1="218" x2="240" y2="218" stroke="#0f2340" stroke-width="2" stroke-linecap="round"/>
  <line x1="248" y1="226" x2="240" y2="228" stroke="#0f2340" stroke-width="2" stroke-linecap="round"/>
  <line x1="352" y1="210" x2="360" y2="208" stroke="#0f2340" stroke-width="2" stroke-linecap="round"/>
  <line x1="352" y1="218" x2="360" y2="218" stroke="#0f2340" stroke-width="2" stroke-linecap="round"/>
  <line x1="352" y1="226" x2="360" y2="228" stroke="#0f2340" stroke-width="2" stroke-linecap="round"/>

  <!-- ═══ CHIN — streamlined V-shape ═══ -->
  <path d="M262,248 L258,262 Q258,272 268,276 L300,290 L332,276 Q342,272 342,262 L338,248"
        fill="url(#helmetSide)" stroke="#b0bcc8" stroke-width="1.5" opacity="0.7"/>
  <!-- Chin center line -->
  <line x1="300" y1="252" x2="300" y2="285" stroke="#c0ccd8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- ═══ STARS ═══ -->
  <g fill="#40d8c0">
    <!-- Left star -->
    <polygon points="230,340 233,348 242,348 235,353 237,362 230,357 223,362 225,353 218,348 227,348" />
    <!-- Right star -->
    <polygon points="370,340 373,348 382,348 375,353 377,362 370,357 363,362 365,353 358,348 367,348" />
  </g>

  <!-- ═══ TEXT ═══ -->
  <text x="300" y="440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="800" text-anchor="middle" letter-spacing="0.5">
    <tspan fill="#1a3660">Debug</tspan><tspan fill="#1a6de0">Pilot</tspan>
  </text>
</svg>
