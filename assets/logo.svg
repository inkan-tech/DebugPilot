<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7b2ff7" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00d2ff" flood-opacity="0.3"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Compass / Navigation ring -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="url(#accent)" stroke-width="4" stroke-opacity="0.5"/>
  <circle cx="256" cy="240" r="140" fill="none" stroke="url(#glow)" stroke-width="2" stroke-dasharray="12 8" stroke-opacity="0.6"/>

  <!-- Cardinal tick marks -->
  <line x1="256" y1="88" x2="256" y2="108" stroke="#00d2ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="372" x2="256" y2="392" stroke="#00d2ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="104" y1="240" x2="124" y2="240" stroke="#00d2ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="388" y1="240" x2="408" y2="240" stroke="#00d2ff" stroke-width="3" stroke-linecap="round"/>

  <!-- Breakpoint dot (red) — the "debug" element -->
  <circle cx="256" cy="240" r="32" fill="#e74856" filter="url(#innerGlow)"/>
  <circle cx="256" cy="240" r="32" fill="none" stroke="#ff6b7a" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Pause bars inside breakpoint -->
  <rect x="245" y="224" width="6" height="32" rx="2" fill="#1a1a2e"/>
  <rect x="261" y="224" width="6" height="32" rx="2" fill="#1a1a2e"/>

  <!-- Navigator arrow / compass needle (pointing up-right = "piloting forward") -->
  <g transform="translate(256, 240) rotate(-45)">
    <!-- North needle -->
    <polygon points="0,-120 -14,-60 0,-70 14,-60" fill="url(#accent)" opacity="0.9"/>
    <!-- South needle -->
    <polygon points="0,120 -14,60 0,70 14,60" fill="#3a3a5c" opacity="0.6"/>
  </g>

  <!-- Small crosshair lines near center -->
  <line x1="220" y1="240" x2="232" y2="240" stroke="#00d2ff" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="280" y1="240" x2="292" y2="240" stroke="#00d2ff" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="256" y1="204" x2="256" y2="216" stroke="#00d2ff" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="256" y1="264" x2="256" y2="276" stroke="#00d2ff" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Code brackets "{ }" on sides -->
  <text x="148" y="252" font-family="monospace" font-size="48" font-weight="bold" fill="#00d2ff" opacity="0.4" text-anchor="middle">{</text>
  <text x="364" y="252" font-family="monospace" font-size="48" font-weight="bold" fill="#7b2ff7" opacity="0.4" text-anchor="middle">}</text>

  <!-- "DebugPilot" text -->
  <text x="256" y="440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="44" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">Debug<tspan fill="url(#accent)">Pilot</tspan></text>
  <text x="256" y="466" font-family="monospace" font-size="14" fill="#00d2ff" text-anchor="middle" opacity="0.6">MCP Debug Server for VS Code</text>
</svg>
